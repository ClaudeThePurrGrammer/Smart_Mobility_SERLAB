version: '3.9'

services:

  # ─── Metro Bundler (React Native / Expo) ───────────────────────────────────
  mobile:
    build:
      context: ./mobile
    container_name: smart_mobility_metro
    ports:
      - "8081:8081"    # Metro bundler — Expo Go si connette qui
      - "19000:19000"  # Expo DevTools
      - "19001:19001"
    environment:
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_IP:-localhost}
    volumes:
      - ./mobile:/app
      - mobile_deps:/app/node_modules
    restart: unless-stopped

